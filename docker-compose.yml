version: '3.8'

services:
  postgres_dev:
    image: postgres:16-alpine
    container_name: mon_projet_postgres_local
    environment:
      POSTGRES_USER: paul
      POSTGRES_PASSWORD: wafellman
      POSTGRES_DB: dbcritique
      
    ports:
      - "5432:5432"
    volumes:
      - pg_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paul -d dbcritique"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mon_application_locale
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://paul:wafellman@postgres_dev:5432/dbcritique
      BETTER_AUTH_SECRET: votre_secret_base64
      BETTER_AUTH_URL: http://localhost:3000
    depends_on:
      postgres_dev:
        condition: service_healthy

volumes:
  pg_local_data: